<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Student Performance Analyzer</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      .card { border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius:6px; }
      input, button { padding:8px; margin:4px; }
    </style>
  </head>
  <body>
    <h1>Student Performance Analyzer</h1>

    <section>
      <h3>Create student</h3>
      <input id="name" placeholder="Name" />
      <input id="matric" placeholder="Matric No" />
      <button onclick="createStudent()">Create</button>
    </section>

    <section>
      <h3>Students</h3>
      <div id="students"></div>
    </section>

    <script>
      async function fetchStudents() {
        const res = await fetch('/api/students');
        const list = await res.json();
        const el = document.getElementById('students');
        el.innerHTML = '';
        list.forEach(s => {
          const div = document.createElement('div');
          div.className = 'card';
          div.innerHTML = '<b>' + s.name + '</b> (' + s.matricNo + ')<br/>' +
            'Grades: ' + (s.grades || []).map(g => g.courseCode + ' ' + g.score + '/' + g.units).join(', ') +
            '<br/><button onclick="openDetail(' + s.id + ')">View</button>';
          el.appendChild(div);
        });
      }

      async function createStudent() {
        const name = document.getElementById('name').value;
        const matricNo = document.getElementById('matric').value;
        await fetch('/api/students', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name, matricNo }) });
        document.getElementById('name').value = '';
        document.getElementById('matric').value = '';
        await fetchStudents();
      }

      async function openDetail(id) {
        const res = await fetch('/api/students/' + id);
        const data = await res.json();
        const w = window.open('', '_blank', 'width=600,height=500');
        w.document.write('<pre>' + JSON.stringify(data, null, 2) + '</pre>');
        w.document.close();
      }

      fetchStudents();
    </script>
  </body>
</html>
